name: Release Drafter

on:
  push:
    branches:
      - main

jobs:
  update_release_draft:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: release-drafter/release-drafter@v6
        with:
          config-name: drafter-config.yml
        env:
          GITHUB_TOKEN: ${{ secrets.YML_GITHUB_TOKEN }}
